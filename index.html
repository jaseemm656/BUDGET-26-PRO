<style>

  .card h3{font-size:16px;margin-bottom:12px}

  .stat-row.border-top{border-top:1px solid #334155;padding-top:12px;margin-top:8px}

  .btn-primary{background:#2563eb;color:white}
  .btn-success{background:#16a34a;color:white}
  .btn-danger{background:#dc2626;color:white}
  .btn-secondary{background:#475569;color:white}
  .btn-orange{background:#ea580c;color:white}
  .btn-teal{background:#0d9488;color:white}
  .btn-purple{background:#9333ea;color:white}
  .btn-yellow{background:#ca8a04;color:white}
  .input{width:100%;padding:10px 12px;background:#334155;border:1px solid #475569;border-radius:8px;color:white;font-size:14px;outline:none}

  .notif-step:last-child{border-bottom:none}

<body>

<div class="header" style="display:flex;justify-content:space-between;align-items:center">
  <div>
    <h1>💰 Financial Tracker Pro</h1>
    <div id="lastSaved" style="font-size:12px;color:#bfdbfe;margin-top:2px">Loading...</div>
  </div>
  <button onclick="manualSave()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:white;padding:10px 14px;border-radius:10px;font-size:20px;cursor:pointer;backdrop-filter:blur(4px)">💾</button>

<script>
// ─── DEFAULT STATE (pre-loaded with your latest backup) ───────────────────────
let state = {

  currentMonth:(function(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})(),
  monthlyIncome:14786,
  emis:[
    {id:1,name:'DIB Loan',    monthlyEmi:3326,   tenure:48,paidMonths:25,amountPaid:83150,   balanceMonths:23,balanceAmount:76498,   dueDate:3, paid:false},

    {id:3,name:'DIB CC2',     monthlyEmi:99.43,  tenure:36,paidMonths:9, amountPaid:894.87,  balanceMonths:27,balanceAmount:2684.61, dueDate:3, paid:false},
    {id:4,name:'ENBD CC',     monthlyEmi:1474.66,tenure:15,paidMonths:15,amountPaid:22119.9, balanceMonths:0, balanceAmount:0,       dueDate:10,paid:true},
    {id:5,name:'EIB CC',      monthlyEmi:1226.6, tenure:15,paidMonths:2, amountPaid:2453.2,  balanceMonths:13,balanceAmount:15945.8, dueDate:25,paid:false},
    {id:6,name:'CashNow App', monthlyEmi:746.67, tenure:3, paidMonths:2, amountPaid:1493.34, balanceMonths:1, balanceAmount:746.67,  dueDate:22,paid:false}
  ],

    {id:1, person:'Vibin',    amount:400,  paid:400,  balance:0},

    {id:3, person:'Jiji',     amount:5000, paid:5000, balance:0},
    {id:4, person:'Jiji (2)', amount:2000, paid:2000, balance:0},
    {id:5, person:'Sherilka', amount:5000, paid:0,    balance:5000},
    {id:6, person:'Sadiq',    amount:1650, paid:0,    balance:1650},
    {id:7, person:'Najad',    amount:650,  paid:0,    balance:650},
    {id:8, person:'Akash',    amount:1050, paid:1050, balance:0},
    {id:9, person:'Divin',    amount:1500, paid:750,  balance:750},
    {id:10,person:'Hasim',    amount:200,  paid:200,  balance:0},
    {id:1774193604894,person:'Dineesh',amount:2000,paid:0,balance:2000}
  ],
  moneyLent:[
    {id:1772825939710,person:'Vibin',amount:2000,collected:2000,balance:0,note:'',dueDate:'',date:'2026-03-06T19:38:59.711Z'}
  ],
  utilities:[
    {id:1,   name:'DEWA',      icon:'⚡',dueDate:20,type:'dewa'},
    {id:2,   name:'Chiller/AC',icon:'❄️',dueDate:25,type:'chiller'},
    {id:3,   name:'Gas',       icon:'🔥',dueDate:15,type:'gas'},
    {id:4,   name:'Internet',  icon:'📶',dueDate:10,type:'internet'},
    {id:5,   name:'Mobile',    icon:'📱',dueDate:5, type:'mobile'},
    {id:9001,name:'Rent',      icon:'🏠',dueDate:15,type:'rent',fixedAmount:1916.66}
  ],
  utilityBills:{
    '2026-03':{
      1:   {amount:283.14, paid:false,date:'2026-03-06T19:43:14.903Z',note:'Paid'},
      2:   {amount:195.79, paid:false,date:'2026-03-06T19:47:06.729Z',note:''},
      4:   {amount:100,    paid:true, date:'2026-03-06T19:47:33.575Z',note:''},
      5:   {amount:69,     paid:true, date:'2026-03-06T19:47:49.825Z',note:''},
      9001:{amount:1916.66,paid:true, date:'2026-03-06T19:48:00.383Z',note:'Monthly rent'}
    }
  },
  fixedExpenses:[
    {id:8001,name:'Family Support',amount:1000,dueDate:1,icon:'👨‍👩‍👧'}
  ],
  fixedExpensePayments:{
    '2026-03':{
      8001:{paid:true,date:'2026-03-08T13:26:50.149Z'}
    }
  },
  monthlyExpenses:{
    '2026-03':[
      {id:1773027653478,date:'2026-03-09T03:40:53.478Z',category:'Entertainment',amount:150,description:'Karama'}
    ]
  },
  editingIncome:false,showAddDebt:false,showAddLent:false,showAddUtility:false,
  emiMonthlyPaid:{},
  lastSaved:'2026-03-08T13:38:04.423Z',
  notificationsEnabled:false
};

// ─── MIGRATION ────────────────────────────────────────────────────────────────
function migrateOldData() {
  if (!state.fixedExpenses) state.fixedExpenses = [];
  if (!state.fixedExpensePayments) state.fixedExpensePayments = {};
  if (!state.emiMonthlyPaid) state.emiMonthlyPaid = {};
  // Migrate Rent from emis → utilities
  const ri = state.emis.findIndex(e => e.name === 'Rent');
  if (ri !== -1) {
    const r = state.emis[ri];
    if (!state.utilities.find(u => u.name === 'Rent'))
      state.utilities.push({id:9001,name:'Rent',icon:'🏠',dueDate:r.dueDate||15,type:'rent',fixedAmount:r.monthlyEmi||1916.66});
    state.emis.splice(ri, 1);
  }
  // Migrate Family Support from emis → fixedExpenses
  const fi = state.emis.findIndex(e => e.name === 'Family Support');
  if (fi !== -1) {
    const f = state.emis[fi];
    if (!state.fixedExpenses.find(x => x.name === 'Family Support'))
      state.fixedExpenses.push({id:8001,name:'Family Support',amount:f.monthlyEmi||1000,dueDate:f.dueDate||1,icon:'👨‍👩‍👧'});
    state.emis.splice(fi, 1);
  }
  if (!state.utilities.find(u => u.name === 'Rent'))
    state.utilities.push({id:9001,name:'Rent',icon:'🏠',dueDate:15,type:'rent',fixedAmount:1916.66});
  if (!state.fixedExpenses.find(x => x.name === 'Family Support'))
    state.fixedExpenses.push({id:8001,name:'Family Support',amount:1000,dueDate:1,icon:'👨‍👩‍👧'});
}

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
function loadData() {
  try {
    const saved = localStorage.getItem('financialTrackerPro_v2');
    if (saved) {
      const p = JSON.parse(saved);
      state = Object.assign({}, state, p, {activeTab:'overview',currentMonth:todayMonth(),editingIncome:false,showAddDebt:false,showAddLent:false,showAddUtility:false});
    } else {
      state.currentMonth = todayMonth();
    }
    migrateOldData();
    saveData();
  } catch(e) { console.error(e); migrateOldData(); }
}

function saveData() {
  try {
    state.lastSaved = new Date().toISOString();
    localStorage.setItem('financialTrackerPro_v2', JSON.stringify(state));
    updateLastSaved(); return true;
  } catch(e) { return false; }
}

function manualSave() { if(saveData()) toast('✅ All data saved!'); }

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='error'?'#ef4444':'#10b981';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

function updateLastSaved() {
  const el = document.getElementById('lastSaved');
  if (!el) return;
  if (state.lastSaved) {
    const d = new Date(state.lastSaved);
    el.textContent = 'Saved: ' + d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function todayMonth(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function mName(m){const[y,mo]=m.split('-');return new Date(y,mo-1).toLocaleDateString('en-US',{month:'long',year:'numeric'});}
function changeMonth(d){
  const[y,m]=state.currentMonth.split('-').map(Number);
  const dt=new Date(y,m-1+d,1);
  const yr=dt.getFullYear();
  const mo=String(dt.getMonth()+1).padStart(2,'0');
  state.currentMonth=yr+'-'+mo;
  saveData();render();
}
function ord(n){return n+(n==1?'st':n==2?'nd':n==3?'rd':'th');}
function fmt(n){return(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtDec(n){return(n||0).toFixed(2);}

// ─── CALCULATIONS ─────────────────────────────────────────────────────────────
// ✅ KEY RULE:
//   Utilities/Fixed Expenses deduct from Available ONLY when marked as PAID
//   Unpaid bills appear in "Pending" but do NOT reduce available balance yet
function getCalc() {
  const bills    = state.utilityBills[state.currentMonth] || {};
  const fpmts    = state.fixedExpensePayments[state.currentMonth] || {};
  const exps     = state.monthlyExpenses[state.currentMonth] || [];

  // EMIs — always deducted (committed monthly obligation)
  const totalEmi    = state.emis.filter(e=>!e.paid).reduce((s,e)=>s+e.monthlyEmi, 0);
  const totalEmiBal = state.emis.reduce((s,e)=>s+e.balanceAmount, 0);

  // Utilities — only PAID bills deduct from balance
  const paidUtil    = Object.values(bills).reduce((s,b)=>s+(b.paid?(b.amount||0):0), 0);
  const totalUtil   = Object.values(bills).reduce((s,b)=>s+(b.amount||0), 0); // total entered (for display)
  const unpaidUtil  = totalUtil - paidUtil;

  // Fixed expenses — only PAID ones deduct
  const paidFixed   = (state.fixedExpenses||[]).reduce((s,f)=>{
    const p = fpmts[f.id];
    return s + (p && p.paid ? f.amount : 0);
  }, 0);
  const totalFixed  = (state.fixedExpenses||[]).reduce((s,f)=>s+f.amount, 0);

  // Regular logged expenses — always deducted (includes Family Support etc)
  const regularExp  = exps.reduce((s,e)=>s+e.amount, 0);

  // Personal debt totals
  const totalDebtP  = state.personalDebts.reduce((s,d)=>s+d.balance, 0);

  // Money lent
  const lentOut     = state.moneyLent.reduce((s,l)=>s+l.balance, 0);
  const lentTotal   = state.moneyLent.reduce((s,l)=>s+l.amount, 0);

  // Available = income minus what's ACTUALLY been paid out
  const totalDeducted = totalEmi + paidUtil + regularExp;
  const available     = state.monthlyIncome - totalDeducted;

  return {
    totalEmi, totalEmiBal, totalDebtP,
    paidUtil, totalUtil, unpaidUtil,
    regularExp, lentOut, lentTotal,
    totalDeducted, available
  };
}

function getPending() {
  const today = new Date().getDate();
  const bills = state.utilityBills[state.currentMonth] || {};
  const fpmts = state.fixedExpensePayments[state.currentMonth] || {};
  const list  = [];

  state.emis.filter(e=>!e.paid).forEach(e=>{
    const d = e.dueDate-today;
    list.push({type:'EMI',name:e.name,amount:e.monthlyEmi,dueDate:e.dueDate,status:d<0?'overdue':d<=3?'due-soon':'upcoming',days:d});
  });

  state.utilities.forEach(u=>{
    const b = bills[u.id];
    if (!b || !b.paid) {
      const d   = u.dueDate-today;
      const amt = b ? b.amount : (u.fixedAmount||0);
      list.push({type:u.type==='rent'?'Rent':'Utility',name:u.name,amount:amt,dueDate:u.dueDate,status:d<0?'overdue':d<=3?'due-soon':'upcoming',days:d});
    }
  });

  (state.fixedExpenses||[]).forEach(f=>{
    const p = fpmts[f.id];
    if (!p || !p.paid) {
      const d = f.dueDate-today;
      list.push({type:'Expense',name:f.name,amount:f.amount,dueDate:f.dueDate,status:d<0?'overdue':d<=3?'due-soon':'upcoming',days:d});
    }
  });

  list.sort((a,b)=>a.dueDate-b.dueDate);
  return list;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function updateIncome(){const v=parseFloat(document.getElementById('income-input').value);if(v>0){state.monthlyIncome=v;state.editingIncome=false;saveData();toast('✅ Income updated!');render();}}

function markEmiPayment(id){
  state.emis=state.emis.map(e=>{
    if(e.id!==id||e.balanceMonths<1)return e;
    const nb=e.balanceMonths-1;
    return{...e,paidMonths:e.paidMonths+1,amountPaid:e.amountPaid+e.monthlyEmi,balanceMonths:nb,balanceAmount:Math.max(0,e.balanceAmount-e.monthlyEmi),paid:nb===0};
  });
  saveData();toast('✅ Payment marked!');render();
}
function undoEmiPayment(id){
  state.emis=state.emis.map(e=>{
    if(e.id!==id||e.paidMonths<1)return e;
    return{...e,paidMonths:e.paidMonths-1,amountPaid:e.amountPaid-e.monthlyEmi,balanceMonths:e.balanceMonths+1,balanceAmount:e.balanceAmount+e.monthlyEmi,paid:false};
  });
  saveData();toast('↩️ Undone!');render();
}

function payDebt(id,amt){
  state.personalDebts=state.personalDebts.map(d=>d.id===id?{...d,paid:d.paid+amt,balance:Math.max(0,d.balance-amt)}:d);
  saveData();toast('✅ Payment recorded!');render();
}

function addNewDebt(){
  const type=document.getElementById('debt-type').value;
  const amt=parseFloat(document.getElementById('debt-amount').value);
  if(!(amt>0))return;
  if(type==='existing'){
    const person=document.getElementById('debt-person').value;
    state.personalDebts=state.personalDebts.map(d=>d.person===person?{...d,amount:d.amount+amt,balance:d.balance+amt}:d);
  }else{
    const person=document.getElementById('new-person').value.trim();
    if(!person)return;
    state.personalDebts.push({id:Date.now(),person,amount:amt,paid:0,balance:amt});
  }
  state.showAddDebt=false;
  saveData();toast('✅ Debt added!');render();
}

function addMoneyLent(){
  const person=document.getElementById('lent-person').value.trim();
  const amt=parseFloat(document.getElementById('lent-amount').value);
  const note=document.getElementById('lent-note').value.trim();
  const dueDate=document.getElementById('lent-due').value;
  if(!person||!(amt>0))return;
  state.moneyLent.push({id:Date.now(),person,amount:amt,collected:0,balance:amt,note,dueDate,date:new Date().toISOString()});
  state.showAddLent=false;
  saveData();toast('✅ Lent entry added!');render();
}

function collectLent(id,amt){
  state.moneyLent=state.moneyLent.map(l=>l.id===id?{...l,collected:l.collected+amt,balance:Math.max(0,l.balance-amt)}:l);
  saveData();toast('✅ Collection recorded!');render();
}

function deleteLent(id){
  if(!confirm('Delete this lent entry?'))return;
  state.moneyLent=state.moneyLent.filter(l=>l.id!==id);
  saveData();toast('🗑️ Deleted!');render();
}

function saveUtilityBill(){
  const uid=parseInt(document.getElementById('util-id').value);
  const amt=parseFloat(document.getElementById('util-amount').value);
  const note=document.getElementById('util-note').value;
  if(!(uid>0)||!(amt>0))return;
  if(!state.utilityBills[state.currentMonth])state.utilityBills[state.currentMonth]={};
  const existing=state.utilityBills[state.currentMonth][uid]||{};
  state.utilityBills[state.currentMonth][uid]={...existing,amount:amt,paid:existing.paid||false,date:new Date().toISOString(),note};
  saveData();toast('✅ Bill saved!');render();
}

// ✅ THIS is what changes the Available balance for utilities
function toggleUtilPaid(uid){
  if(!state.utilityBills[state.currentMonth])state.utilityBills[state.currentMonth]={};
  const b=state.utilityBills[state.currentMonth][uid]||{};
  state.utilityBills[state.currentMonth][uid]={...b,paid:!b.paid};
  const wasPaid=b.paid;
  saveData();
  toast(wasPaid?'↩️ Marked unpaid — AED '+fmt(b.amount||0)+' added back to balance':'✅ Paid! AED '+fmt(b.amount||0)+' deducted from balance');
  render();
}

function quickAddRent(uid){
  const u=state.utilities.find(u=>u.id===uid);
  if(!u||!u.fixedAmount)return;
  if(!state.utilityBills[state.currentMonth])state.utilityBills[state.currentMonth]={};
  state.utilityBills[state.currentMonth][uid]={amount:u.fixedAmount,paid:false,date:new Date().toISOString(),note:'Monthly rent'};
  saveData();toast('✅ Rent bill entered! Tap "Mark as Paid" to deduct from balance.');render();
}

function addCustomUtility(){
  const name=document.getElementById('cu-name').value.trim();
  const icon=document.getElementById('cu-icon').value.trim()||'🏠';
  const dueDate=parseInt(document.getElementById('cu-due').value);
  if(!name||!(dueDate>0))return;
  state.utilities.push({id:Date.now(),name,icon,dueDate,type:'custom'});
  state.showAddUtility=false;
  saveData();toast('✅ Utility added!');render();
}

// ✅ THIS is what changes the Available balance for fixed expenses
function toggleFixedExpPaid(id){
  if(!state.fixedExpensePayments[state.currentMonth])state.fixedExpensePayments[state.currentMonth]={};
  const p=state.fixedExpensePayments[state.currentMonth][id]||{};
  const exp=state.fixedExpenses.find(f=>f.id===id);
  state.fixedExpensePayments[state.currentMonth][id]={paid:!p.paid,date:new Date().toISOString()};
  const wasPaid=p.paid;
  saveData();
  toast(wasPaid?'↩️ Marked unpaid':'✅ Paid! AED '+fmt(exp?exp.amount:0)+' deducted from balance');
  render();
}

function addExpense(){
  const cat=document.getElementById('exp-cat').value;
  const amt=parseFloat(document.getElementById('exp-amt').value);
  const desc=document.getElementById('exp-desc').value;
  if(!(amt>0))return;
  if(!state.monthlyExpenses[state.currentMonth])state.monthlyExpenses[state.currentMonth]=[];
  state.monthlyExpenses[state.currentMonth].push({id:Date.now(),date:new Date().toISOString(),category:cat,amount:amt,description:desc});
  saveData();toast('✅ Expense added!');render();
}

function deleteExpense(id){
  if(!state.monthlyExpenses[state.currentMonth])return;
  state.monthlyExpenses[state.currentMonth]=state.monthlyExpenses[state.currentMonth].filter(e=>e.id!==id);
  saveData();toast('🗑️ Deleted!');render();
}

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='fin-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  toast('📥 Exported!');
}

function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      state=Object.assign({},state,p,{activeTab:'overview',currentMonth:todayMonth(),editingIncome:false,showAddDebt:false,showAddLent:false,showAddUtility:false});
      migrateOldData();
      saveData();toast('📤 Imported!');render();
    }catch{toast('❌ Invalid file!','error');}
  };
  r.readAsText(file);
}

// ─── MONTHLY LEDGER ───────────────────────────────────────────────────────────
function updateLedgerIncome(){
  const v=parseFloat(document.getElementById('ledger-income').value);
  if(v>0){state.monthlyIncome=v;saveData();toast('✅ Income updated!');render();}
}
function ledgerToggleUtil(uid){
  if(!state.utilityBills[state.currentMonth])state.utilityBills[state.currentMonth]={};
  const b=state.utilityBills[state.currentMonth][uid]||{};
  const u=state.utilities.find(u=>u.id===uid);
  if(!b.amount&&u&&u.fixedAmount){
    state.utilityBills[state.currentMonth][uid]={amount:u.fixedAmount,paid:true,date:new Date().toISOString(),note:''};
  } else {
    state.utilityBills[state.currentMonth][uid]={...b,paid:!b.paid};
  }
  saveData();render();
}
function ledgerSaveUtilAmt(uid){
  const v=parseFloat(document.getElementById('lu-'+uid).value);
  if(!(v>0))return;
  if(!state.utilityBills[state.currentMonth])state.utilityBills[state.currentMonth]={};
  const b=state.utilityBills[state.currentMonth][uid]||{};
  state.utilityBills[state.currentMonth][uid]={...b,amount:v,date:new Date().toISOString()};
  saveData();toast('✅ Amount saved!');render();
}
function ledgerSaveEmiAmt(id){
  const v=parseFloat(document.getElementById('le-'+id).value);
  if(!(v>0))return;
  state.emis=state.emis.map(e=>e.id===id?{...e,monthlyEmi:v}:e);
  saveData();toast('✅ EMI updated!');render();
}
function ledgerAddExp(){
  const cat=document.getElementById('lx-cat').value;
  const amt=parseFloat(document.getElementById('lx-amt').value);
  const desc=document.getElementById('lx-desc').value.trim();
  if(!(amt>0))return;
  if(!state.monthlyExpenses[state.currentMonth])state.monthlyExpenses[state.currentMonth]=[];
  state.monthlyExpenses[state.currentMonth].push({id:Date.now(),date:new Date().toISOString(),category:cat,amount:amt,description:desc});
  document.getElementById('lx-amt').value='';
  document.getElementById('lx-desc').value='';
  saveData();toast('✅ Expense added!');render();
}
function ledgerDelExp(id){
  if(!state.monthlyExpenses[state.currentMonth])return;
  state.monthlyExpenses[state.currentMonth]=state.monthlyExpenses[state.currentMonth].filter(e=>e.id!==id);
  saveData();render();
}

function renderPlanner(){
  const bills  = state.utilityBills[state.currentMonth]||{};
  const exps   = state.monthlyExpenses[state.currentMonth]||[];

  // Running balance calculation — same logic as getCalc
  const totalEmi  = state.emis.filter(e=>!e.paid).reduce((s,e)=>s+e.monthlyEmi,0);
  const paidUtil  = Object.values(bills).reduce((s,b)=>s+(b.paid?b.amount||0:0),0);
  const totalExp  = exps.reduce((s,e)=>s+e.amount,0);
  const available = state.monthlyIncome - totalEmi - paidUtil - totalExp;

  // Row builder
  const row=(cols,style='',cls='')=>
    '<div class="pr-row '+cls+'" style="display:grid;grid-template-columns:'+cols.map(c=>c.w).join(' ')+';align-items:center;padding:9px 12px;border-bottom:1px solid #1e293b;'+style+'">'+
      cols.map(c=>'<div style="font-size:13px;'+( c.style||'')+'" >'+c.v+'</div>').join('')+

// ─── MONTHLY SUMMARY ──────────────────────────────────────────────────────────
// Toggle EMI paid status for THIS month only
function toggleEmiMonthlyPaid(id){
  if(!state.emiMonthlyPaid[state.currentMonth]) state.emiMonthlyPaid[state.currentMonth]={};
  const wasAlreadyPaid = !!state.emiMonthlyPaid[state.currentMonth][id];
  if(wasAlreadyPaid){
    // Undo — remove from monthly paid, undo loan counter
    delete state.emiMonthlyPaid[state.currentMonth][id];
    undoEmiPayment(id); // rolls back paidMonths counter
  } else {
    // Pay — record in monthly paid, advance loan counter
    state.emiMonthlyPaid[state.currentMonth][id] = true;
    markEmiPayment(id); // advances paidMonths counter
  }
  saveData(); render();
}

function renderMonthly(){
  const bills   = state.utilityBills[state.currentMonth]||{};
  const exps    = state.monthlyExpenses[state.currentMonth]||[];
  const empaid  = state.emiMonthlyPaid[state.currentMonth]||{};
  const today   = new Date().getDate();

  // Build items — EMI paid status comes from emiMonthlyPaid[month]
  const items=[];
  state.emis.filter(e=>!e.paid).forEach(e=>{
    items.push({
      label:e.name,
      sub:'EMI • Due '+ord(e.dueDate)+' • '+e.balanceMonths+' mo left',
      amount:e.monthlyEmi,
      paidThisMonth: !!empaid[e.id],  // ← key: only paid if tapped this month
      type:'emi', id:e.id, icon:'📅', dueDate:e.dueDate
    });
  });
  state.utilities.forEach(u=>{
    const b=bills[u.id]||{};
    const amt=b.amount||(u.fixedAmount||0);
    items.push({label:u.name, sub:(u.type==='rent'?'Rent':'Utility')+' • Due '+ord(u.dueDate), amount:amt, paidThisMonth:b.paid||false, type:'util', uid:u.id, icon:u.icon, dueDate:u.dueDate, hasAmt:!!b.amount});
  });
  exps.forEach(exp=>{
    items.push({label:exp.category, sub:(exp.description||'Expense')+' • '+new Date(exp.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}), amount:exp.amount, paidThisMonth:true, type:'exp', id:exp.id, icon:'📊', dueDate:0});
  });

  // Totals — only PAID items deduct
  const totalPaidEmi  = items.filter(i=>i.type==='emi'&&i.paidThisMonth).reduce((s,i)=>s+i.amount,0);
  const totalPaidUtil = items.filter(i=>i.type==='util'&&i.paidThisMonth).reduce((s,i)=>s+i.amount,0);
  const totalPaidExp  = exps.reduce((s,e)=>s+e.amount,0);
  const totalPaid     = totalPaidEmi + totalPaidUtil + totalPaidExp;
  const finalBalance  = state.monthlyIncome - totalPaid;

  // Pending (not yet paid)
  const pendingEmi    = items.filter(i=>i.type==='emi'&&!i.paidThisMonth).reduce((s,i)=>s+i.amount,0);
  const pendingUtil   = items.filter(i=>i.type==='util'&&!i.paidThisMonth&&i.amount>0).reduce((s,i)=>s+i.amount,0);
  const totalPending  = pendingEmi + pendingUtil;

  function dueBadge(d){
    if(!d)return'';
    const diff=d-today;
    if(diff<0)return'<span style="background:#dc2626;color:white;font-size:9px;padding:1px 6px;border-radius:8px;margin-left:5px;font-weight:700">OVERDUE</span>';
    if(diff<=3)return'<span style="background:#f59e0b;color:#000;font-size:9px;padding:1px 6px;border-radius:8px;margin-left:5px;font-weight:700">DUE SOON</span>';
    return'';
  }

  // Build waterfall rows with running balance
  let runBal = state.monthlyIncome;
  let rows   = '';
  items.forEach(item=>{
    // Only deduct if this item was actually paid
    if(item.paidThisMonth && item.amount>0) runBal -= item.amount;
    const balColor   = runBal>=0?'#10b981':'#ef4444';
    const amtColor   = item.paidThisMonth ? '#10b981' : '#f59e0b';
    const rowBg      = item.paidThisMonth ? 'rgba(16,185,129,.05)' : 'rgba(255,255,255,.01)';

    // Action button
    let btn='';
    if(item.type==='emi'){
      if(item.paidThisMonth){
        btn='<button onclick="toggleEmiMonthlyPaid('+item.id+')" style="background:rgba(6,78,59,.5);border:1px solid #10b981;color:#10b981;padding:5px 10px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">✅ Paid — Undo ↩️</button>';
      } else {
        btn='<button onclick="toggleEmiMonthlyPaid('+item.id+')" style="background:#2563eb;border:none;color:white;padding:5px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Mark Paid ✓</button>';
      }
    } else if(item.type==='util'){
      if(!item.hasAmt){
        btn='<button onclick="state.activeTab=\'utilities\';render()" style="background:#334155;border:none;color:#94a3b8;padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer;white-space:nowrap">Enter Bill</button>';
      } else if(item.paidThisMonth){
        btn='<button onclick="toggleUtilPaid('+item.uid+')" style="background:rgba(6,78,59,.5);border:1px solid #10b981;color:#10b981;padding:5px 10px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">✅ Paid — Undo ↩️</button>';
      } else {
        btn='<button onclick="toggleUtilPaid('+item.uid+')" style="background:#ca8a04;border:none;color:white;padding:5px 10px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Mark Paid ✓</button>';
      }
    } else {
      btn='<button onclick="deleteExpense('+item.id+')" style="background:#450a0a;border:none;color:#fca5a5;padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer">🗑️</button>';
    }

    rows +=
      '<div style="border-bottom:1px solid #1e293b;padding:12px 14px;background:'+rowBg+'">'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'+
          '<div style="font-size:20px;width:28px;text-align:center">'+item.icon+'</div>'+
          '<div style="flex:1">'+
            '<div style="font-size:14px;font-weight:700">'+item.label+(item.type==='emi'?dueBadge(item.dueDate):'')+'</div>'+
            '<div style="font-size:11px;color:#64748b;margin-top:1px">'+item.sub+'</div>'+
          '</div>'+
          '<div style="text-align:right">'+
            '<div style="font-size:15px;font-weight:800;color:'+amtColor+'">'+(item.amount>0?(item.paidThisMonth?'— ':'  ')+'AED '+fmt(item.amount):'—')+'</div>'+
            '<div style="font-size:10px;color:'+(item.paidThisMonth?'#10b981':'#94a3b8')+'">'+
              (item.paidThisMonth?'✅ deducted':'⏳ not paid')+

          '</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid #1e293b">'+
          btn+
          '<div style="text-align:right">'+
            '<div style="font-size:10px;color:#64748b">Balance after</div>'+
            '<div style="font-size:15px;font-weight:800;color:'+balColor+'">AED '+fmt(runBal)+'</div>'+
          '</div>'+
        '</div>'+
      '</div>';
  });

  // Quick add expense
  const cats=['Family Support','Food & Groceries','Transportation','Entertainment','Healthcare','Clothing','Personal Care','Other'];
  const addForm=
    '<div style="background:#1e293b;border-radius:12px;padding:14px;margin-bottom:14px">'+

          '<input type="text" id="mo-exp-desc" placeholder="Note" style="flex:1;padding:9px 10px;background:#334155;border:1px solid #475569;border-radius:8px;color:white;font-size:13px;outline:none">'+
        '</div>'+
        '<button onclick="(function(){var c=document.getElementById(\'mo-exp-cat\').value;var a=parseFloat(document.getElementById(\'mo-exp-amt\').value);var d=document.getElementById(\'mo-exp-desc\').value;if(!(a>0))return;if(!state.monthlyExpenses[state.currentMonth])state.monthlyExpenses[state.currentMonth]=[];state.monthlyExpenses[state.currentMonth].push({id:Date.now(),date:new Date().toISOString(),category:c,amount:a,description:d});saveData();toast(\'✅ Added!\');render();})()" style="background:#9333ea;border:none;color:white;padding:10px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">Add Expense</button>'+
      '</div>'+
    '</div>';

  return (
    '<h2 style="font-size:18px;font-weight:800;margin-bottom:12px">📆 Monthly — '+mName(state.currentMonth)+'</h2>'+

    // Income card
    '<div style="background:linear-gradient(135deg,#1e3a5f,#1e1b4b);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">'+
      '<div>'+
        '<div style="font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px">Monthly Income</div>'+
        '<div style="font-size:32px;font-weight:800;color:#6ee7b7">AED '+fmt(state.monthlyIncome)+'</div>'+
      '</div>'+
      '<button onclick="state.editingIncome=true;render()" style="background:rgba(255,255,255,.1);border:none;color:white;padding:8px 12px;border-radius:9px;font-size:16px;cursor:pointer">✏️</button>'+
    '</div>'+
    (state.editingIncome?
      '<div style="background:#1e293b;border-radius:10px;padding:12px;margin-bottom:12px;display:flex;gap:8px">'+
        '<input type="number" id="income-input" value="'+state.monthlyIncome+'" style="flex:1;padding:9px 12px;background:#334155;border:1px solid #475569;border-radius:8px;color:white;font-size:15px;outline:none">'+
        '<button onclick="updateIncome()" style="background:#10b981;border:none;color:white;padding:9px 14px;border-radius:8px;font-weight:700;cursor:pointer">Save</button>'+
        '<button onclick="state.editingIncome=false;render()" style="background:#475569;border:none;color:white;padding:9px 12px;border-radius:8px;cursor:pointer">✕</button>'+
      '</div>':'')+

    // Live balance status
    '<div style="background:'+(finalBalance>=0?'rgba(16,185,129,.12)':'rgba(220,38,38,.12)')+';border:2px solid '+(finalBalance>=0?'#10b981':'#ef4444')+';border-radius:14px;padding:16px;margin-bottom:14px">'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
        '<div style="text-align:center">'+
          '<div style="font-size:10px;color:#94a3b8;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Paid Out</div>'+
          '<div style="font-size:22px;font-weight:800;color:#ef4444">AED '+fmt(totalPaid)+'</div>'+
        '</div>'+
        '<div style="text-align:center">'+
          '<div style="font-size:10px;color:#94a3b8;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">'+(finalBalance>=0?'In Hand':'Overspent')+'</div>'+
          '<div style="font-size:22px;font-weight:800;color:'+(finalBalance>=0?'#10b981':'#ef4444')+'">AED '+fmt(Math.abs(finalBalance))+'</div>'+
        '</div>'+
      '</div>'+
      (totalPending>0?
        '<div style="margin-top:12px;padding-top:10px;border-top:1px solid #334155">'+
          '<div style="display:flex;justify-content:space-between;align-items:center">'+
            '<span style="font-size:12px;color:#f59e0b">⏳ Still to pay this month</span>'+
            '<span style="font-size:14px;font-weight:700;color:#f59e0b">AED '+fmt(totalPending)+'</span>'+
          '</div>'+
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">'+
            '<span style="font-size:11px;color:#64748b">After all paid, left in hand</span>'+
            '<span style="font-size:13px;font-weight:700;color:'+(finalBalance-totalPending>=0?'#10b981':'#ef4444')+'">AED '+fmt(finalBalance-totalPending)+'</span>'+
          '</div>'+
        '</div>':'') +
    '</div>'+

    // Waterfall list
    '<div style="background:#1e293b;border-radius:14px;overflow:hidden;margin-bottom:14px">'+
      '<div style="padding:11px 14px;background:linear-gradient(90deg,#1e3a5f,#1e1b4b);display:flex;justify-content:space-between;align-items:center">'+
        '<span style="font-weight:700;font-size:14px">💸 Payment Waterfall</span>'+
        '<span style="font-size:11px;color:rgba(255,255,255,.45)">Tap "Mark Paid ✓" to deduct</span>'+
      '</div>'+
      // Starting balance row
      '<div style="background:rgba(16,185,129,.08);padding:11px 14px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;align-items:center">'+
        '<span style="font-size:13px;font-weight:700;color:#6ee7b7">🟢 Income this month</span>'+
        '<span style="font-size:17px;font-weight:800;color:#6ee7b7">AED '+fmt(state.monthlyIncome)+'</span>'+
      '</div>'+
      (items.length===0?'<div style="padding:24px;text-align:center;color:#64748b">No items yet</div>':rows)+
      // Final row
      '<div style="padding:14px;background:'+(finalBalance>=0?'rgba(16,185,129,.12)':'rgba(220,38,38,.12)')+';display:flex;justify-content:space-between;align-items:center;border-top:2px solid '+(finalBalance>=0?'#10b981':'#ef4444')+'">'+
        '<div>'+
          '<div style="font-size:14px;font-weight:700;color:'+(finalBalance>=0?'#10b981':'#ef4444')+'">'+(finalBalance>=0?'✅ Balance in Hand':'⚠️ Overspent')+'</div>'+
          '<div style="font-size:11px;color:#64748b">Based on what you have marked paid</div>'+
        '</div>'+
        '<div style="font-size:24px;font-weight:800;color:'+(finalBalance>=0?'#10b981':'#ef4444')+'">AED '+fmt(finalBalance)+'</div>'+
      '</div>'+
    '</div>'+
    addForm
  );
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
function renderNotifications(){
  const supported='Notification' in window;
  const granted=supported&&Notification.permission==='granted';
  const allItems=[...state.emis.filter(e=>!e.paid),...state.utilities,...(state.fixedExpenses||[])];
  return '<h2 class="text-xl font-bold mb-4">🔔 Reminders & Notifications</h2>'+
    '<div class="card mb-4" style="border:1px solid #2563eb"><h3 class="mb-3">📱 Browser Notifications</h3>'+
      (!supported?'<p class="text-sm text-red">❌ Not supported.</p>':
       granted?
        '<div style="background:rgba(16,185,129,.15);border:1px solid #10b981;border-radius:8px;padding:12px;margin-bottom:12px"><p class="text-green font-bold">✅ Enabled!</p></div>':
        '<button class="btn btn-primary" style="width:100%" onclick="requestNotif()">🔔 Enable Notifications</button>')+
    '</div>'+
    '<div class="card"><h3 class="font-bold mb-3">📋 Due Dates Reference</h3>'+
      allItems.map(item=>'<div class="stat-row" style="padding:8px 0;border-bottom:1px solid #334155"><span class="text-sm">'+(item.name||item.person)+'</span><span class="badge badge-info">'+ord(item.dueDate)+' of month</span></div>').join('')+
    '</div>';
}

async function requestNotif(){
  if(!('Notification' in window)){toast('❌ Not supported','error');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){state.notificationsEnabled=true;saveData();toast('🔔 Enabled!');}
  else toast('❌ Permission denied','error');
  render();
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function renderNav(){
  return[
    {id:'overview', icon:'💵',label:'Overview'},
    {id:'monthly',  icon:'📆',label:'Monthly'},
    {id:'planner',  icon:'📋',label:'Planner'},
    {id:'pending',  icon:'⏰',label:'Pending'},
    {id:'emis',     icon:'📅',label:'EMIs'},
    {id:'personal', icon:'📉',label:'Debts'},
    {id:'lent',     icon:'🤝',label:'Lent'},
    {id:'utilities',icon:'🏠',label:'Utils'},
    {id:'expenses', icon:'📊',label:'Expenses'},
    {id:'notifications',icon:'🔔',label:'Alerts'},
  ].map(t=>'<button class="nav-btn '+(state.activeTab===t.id?'active':'')+'" onclick="state.activeTab=\''+t.id+'\';render()"><span style="font-size:20px">'+t.icon+'</span><span>'+t.label+'</span></button>').join('');
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const ms=document.getElementById('monthSelector');
  ms.innerHTML=renderMonthSel();
  switch(state.activeTab){
    case 'overview':      app.innerHTML=renderOverview();      break;
    case 'monthly':       app.innerHTML=renderMonthly();       break;
    case 'planner':       app.innerHTML=renderPlanner();       break;
    case 'pending':       app.innerHTML=renderPending();       break;
    case 'emis':          app.innerHTML=renderEmis();          break;
    case 'personal':      app.innerHTML=renderPersonalDebts(); break;
    case 'lent':          app.innerHTML=renderMoneyLent();     break;
    case 'utilities':     app.innerHTML=renderUtilities();     break;
    case 'expenses':      app.innerHTML=renderExpenses();      break;
    case 'notifications': app.innerHTML=renderNotifications(); break;
    default:              app.innerHTML=renderOverview();
  }
  document.getElementById('bottomNav').innerHTML=renderNav();
  updateLastSaved();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadData();
render();
setInterval(saveData, 30000);
</script>
