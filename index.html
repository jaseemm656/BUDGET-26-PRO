<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Financial Tracker Pro</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:white;padding-bottom:80px;min-height:100vh}
  .header{background:linear-gradient(135deg,#2563eb,#9333ea);padding:24px;position:sticky;top:0;z-index:10;box-shadow:0 4px 6px rgba(0,0,0,.3)}
  .header h1{font-size:24px;margin-bottom:4px}
  .header p{font-size:14px;color:#dbeafe}
  .month-selector{background:#1e293b;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin:16px;border-radius:12px}
  .month-selector button{background:#334155;border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer}
  .current-month{font-weight:bold;font-size:16px;flex:1;text-align:center}
  .container{padding:0 16px}
  .card{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:16px}
  .card h2{font-size:18px;margin-bottom:12px}
  .card h3{font-size:16px;margin-bottom:12px}
  .stat-row{display:flex;justify-content:space-between;padding:12px 0}
  .stat-row.border-top{border-top:1px solid #334155;padding-top:12px;margin-top:12px}
  .btn{padding:12px 16px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
  .btn-primary{background:#2563eb;color:white}
  .btn-success{background:#16a34a;color:white}
  .btn-danger{background:#dc2626;color:white}
  .btn-secondary{background:#475569;color:white}
  .btn-orange{background:#ea580c;color:white}
  .btn-teal{background:#0d9488;color:white}
  .btn-purple{background:#9333ea;color:white}
  .btn-yellow{background:#ca8a04;color:white}
  .input{width:100%;padding:10px 12px;background:#334155;border:1px solid #475569;border-radius:8px;color:white;font-size:14px}
  .input::placeholder{color:#94a3b8}
  select{width:100%;padding:10px 12px;background:#334155;border:1px solid #475569;border-radius:8px;color:white;font-size:14px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .flex{display:flex}
  .flex-gap{gap:8px}
  .flex-1{flex:1}
  .space-y > *+*{margin-top:12px}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex;overflow-x:auto}
  .nav-btn{flex:1;min-width:60px;padding:12px 4px;background:none;border:none;color:white;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .nav-btn.active{background:#2563eb}
  .nav-btn span{font-size:11px}
  .save-btn{position:fixed;bottom:100px;right:20px;width:56px;height:56px;background:linear-gradient(135deg,#10b981,#059669);border-radius:50%;border:none;color:white;font-size:22px;box-shadow:0 4px 12px rgba(16,185,129,.4);cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center}
  .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#10b981;color:white;padding:12px 24px;border-radius:8px;font-weight:bold;z-index:1000;opacity:0;transition:opacity .3s;white-space:nowrap}
  .toast.show{opacity:1}
  .hidden{display:none!important}
  .text-green{color:#10b981}
  .text-red{color:#ef4444}
  .text-orange{color:#f97316}
  .text-gray{color:#94a3b8}
  .text-teal{color:#2dd4bf}
  .text-yellow{color:#fbbf24}
  .text-purple{color:#a78bfa}
  .text-sm{font-size:13px}
  .text-xl{font-size:20px}
  .text-2xl{font-size:24px}
  .text-3xl{font-size:30px}
  .font-bold{font-weight:bold}
  .mb-2{margin-bottom:8px}
  .mb-3{margin-bottom:12px}
  .mb-4{margin-bottom:16px}
  .mt-2{margin-top:8px}
  .mt-3{margin-top:12px}
  .paid-card{background:rgba(6,78,59,.3);border:1px solid #10b981}
  .cleared-card{opacity:.6}
  .progress-bar{background:#334155;border-radius:9999px;height:8px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#10b981);transition:width .3s}
  .alert{background:rgba(127,29,29,.5);border:2px solid #ef4444;border-radius:12px;padding:16px;margin-bottom:16px;display:flex;gap:12px}
  .icon-btn{background:none;border:none;color:#60a5fa;cursor:pointer;padding:4px}
  .pending-item{background:#334155;border-radius:8px;padding:12px;margin-bottom:8px;border-left:4px solid #3b82f6}
  .pending-item.due-soon{border-left-color:#f59e0b}
  .pending-item.overdue{border-left-color:#dc2626;background:rgba(127,29,29,.2)}
  .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:bold}
  .badge-danger{background:#dc2626}
  .badge-warning{background:#f59e0b;color:#000}
  .badge-info{background:#3b82f6}
  .badge-success{background:#16a34a}
  .badge-teal{background:#0d9488}
  .badge-purple{background:#9333ea}
  .last-saved{font-size:12px;color:#94a3b8;text-align:center;padding:8px;background:#1e293b;border-radius:8px;margin:16px}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .summary-card{background:#1e293b;border-radius:10px;padding:14px;text-align:center}
  .summary-card .val{font-size:22px;font-weight:bold}
  .summary-card .lbl{font-size:11px;color:#94a3b8;margin-top:2px}
  .lent-item{background:#334155;border-radius:8px;padding:12px;margin-bottom:8px;border-left:4px solid #2dd4bf}
  .lent-item.collected{background:rgba(6,78,59,.3);border-left-color:#10b981}
  .notif-box{background:rgba(37,99,235,.15);border:1px solid #2563eb;border-radius:12px;padding:16px;margin-bottom:16px}
  .notif-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #1e293b}
  .notif-step:last-child{border-bottom:none}
  .step-num{width:28px;height:28px;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;flex-shrink:0}
  .divider-label{font-size:11px;color:#64748b;text-align:center;padding:6px 0;letter-spacing:1px;text-transform:uppercase;border-top:1px dashed #334155;margin:8px 0}
</style>
</head>
<body>

<div class="header">
  <h1>💰 Financial Tracker Pro</h1>
  <p id="headerSub">Auto-save enabled • Tap 💾 to save manually</p>
</div>

<div class="last-saved" id="lastSaved">Loading...</div>
<div id="monthSelector"></div>
<div class="container" id="app"></div>

<button class="save-btn" onclick="manualSave()" title="Save">💾</button>

<div class="toast" id="toast"></div>
<div class="bottom-nav" id="bottomNav"></div>

<script>
// ─── DEFAULT STATE ────────────────────────────────────────────────────────────
let state = {
  activeTab: 'overview',
  currentMonth: new Date().toISOString().slice(0,7),
  monthlyIncome: 9530,
  emis: [
    {id:1, name:'DIB Loan',    monthlyEmi:3326,    tenure:48, paidMonths:23, amountPaid:76498,    balanceMonths:25, balanceAmount:83150,    dueDate:3,  paid:false},
    {id:2, name:'DIB CC1',     monthlyEmi:454.21,  tenure:36, paidMonths:8,  amountPaid:3633.68,  balanceMonths:28, balanceAmount:12717.88, dueDate:3,  paid:false},
    {id:3, name:'DIB CC2',     monthlyEmi:99.43,   tenure:36, paidMonths:8,  amountPaid:795.44,   balanceMonths:28, balanceAmount:2784.04,  dueDate:3,  paid:false},
    {id:4, name:'ENBD CC',     monthlyEmi:1474.66, tenure:15, paidMonths:15, amountPaid:22119.90, balanceMonths:0,  balanceAmount:0,        dueDate:10, paid:true},
    {id:5, name:'EIB CC',      monthlyEmi:1226.60, tenure:15, paidMonths:1,  amountPaid:1226.60,  balanceMonths:14, balanceAmount:17172.40, dueDate:25, paid:false},
    {id:6, name:'CashNow App', monthlyEmi:746.67,  tenure:3,  paidMonths:1,  amountPaid:746.67,   balanceMonths:2,  balanceAmount:1493.34,  dueDate:22, paid:false}
  ],
  personalDebts: [
    {id:1,  person:'Vibin',    amount:400,  paid:0,    balance:400},
    {id:2,  person:'Hafeel',   amount:4450, paid:2000, balance:2450},
    {id:3,  person:'Jiji',     amount:5000, paid:1300, balance:3700},
    {id:4,  person:'Jiji (2)', amount:2000, paid:1500, balance:500},
    {id:5,  person:'Sherilka', amount:5000, paid:0,    balance:5000},
    {id:6,  person:'Sadiq',    amount:1650, paid:0,    balance:1650},
    {id:7,  person:'Najad',    amount:650,  paid:0,    balance:650},
    {id:8,  person:'Akash',    amount:1050, paid:0,    balance:1050},
    {id:9,  person:'Divin',    amount:1500, paid:0,    balance:1500},
    {id:10, person:'Hasim',    amount:200,  paid:0,    balance:200}
  ],
  moneyLent: [],
  utilities: [
    {id:1,    name:'DEWA',       icon:'⚡', dueDate:20, type:'dewa'},
    {id:2,    name:'Chiller/AC', icon:'❄️', dueDate:25, type:'chiller'},
    {id:3,    name:'Gas',        icon:'🔥', dueDate:15, type:'gas'},
    {id:4,    name:'Internet',   icon:'📶', dueDate:10, type:'internet'},
    {id:5,    name:'Mobile',     icon:'📱', dueDate:5,  type:'mobile'},
    {id:9001, name:'Rent',       icon:'🏠', dueDate:15, type:'rent', fixedAmount:1916.66}
  ],
  utilityBills: {},
  fixedExpenses: [
    {id:8001, name:'Family Support', amount:1000, dueDate:1, icon:'👨‍👩‍👧'}
  ],
  fixedExpensePayments: {},
  monthlyExpenses: {},
  editingIncome: false,
  showAddDebt: false,
  showAddLent: false,
  showAddUtility: false,
  lastSaved: null,
  notificationsEnabled: false
};

// ─── MIGRATION (handles old backups that have Rent/Family Support in emis) ────
function migrateOldData() {
  if (!state.fixedExpenses)       state.fixedExpenses = [];
  if (!state.fixedExpensePayments) state.fixedExpensePayments = {};

  // Migrate Rent from emis → utilities
  const ri = state.emis.findIndex(e => e.name === 'Rent');
  if (ri !== -1) {
    const r = state.emis[ri];
    if (!state.utilities.find(u => u.name === 'Rent')) {
      state.utilities.push({id:9001, name:'Rent', icon:'🏠', dueDate:r.dueDate||15, type:'rent', fixedAmount:r.monthlyEmi||1916.66});
    }
    state.emis.splice(ri, 1);
  }

  // Migrate Family Support from emis → fixedExpenses
  const fi = state.emis.findIndex(e => e.name === 'Family Support');
  if (fi !== -1) {
    const f = state.emis[fi];
    if (!state.fixedExpenses.find(x => x.name === 'Family Support')) {
      state.fixedExpenses.push({id:8001, name:'Family Support', amount:f.monthlyEmi||1000, dueDate:f.dueDate||1, icon:'👨‍👩‍👧'});
    }
    state.emis.splice(fi, 1);
  }

  // Ensure Rent utility exists
  if (!state.utilities.find(u => u.name === 'Rent')) {
    state.utilities.push({id:9001, name:'Rent', icon:'🏠', dueDate:15, type:'rent', fixedAmount:1916.66});
  }
  // Ensure Family Support fixed expense exists
  if (!state.fixedExpenses.find(x => x.name === 'Family Support')) {
    state.fixedExpenses.push({id:8001, name:'Family Support', amount:1000, dueDate:1, icon:'👨‍👩‍👧'});
  }
}

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
function loadData() {
  try {
    const saved = localStorage.getItem('financialTrackerPro_v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = Object.assign({}, state, parsed, {
        activeTab:'overview', editingIncome:false,
        showAddDebt:false, showAddLent:false, showAddUtility:false
      });
    }
    migrateOldData();
    saveData();
  } catch(e) { console.error('Load error:', e); migrateOldData(); }
}

function saveData() {
  try {
    state.lastSaved = new Date().toISOString();
    localStorage.setItem('financialTrackerPro_v2', JSON.stringify(state));
    updateLastSaved();
    return true;
  } catch(e) { console.error('Save error:', e); return false; }
}

function manualSave() { if (saveData()) toast('✅ All data saved!'); }

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'error' ? '#ef4444' : '#10b981';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function updateLastSaved() {
  const el = document.getElementById('lastSaved');
  if (!el) return;
  if (state.lastSaved) {
    const d = new Date(state.lastSaved);
    el.textContent = 'Last saved: ' + d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  } else { el.textContent = 'Not saved yet'; }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function monthName(m) {
  const [y,mo] = m.split('-');
  return new Date(y, mo-1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function changeMonth(d) {
  const [y,m] = state.currentMonth.split('-').map(Number);
  const dt = new Date(y, m-1+d, 1);
  state.currentMonth = dt.toISOString().slice(0,7);
  render();
}
function ord(n) { return n+(n==1?'st':n==2?'nd':n==3?'rd':'th'); }
function fmt(n) { return (n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}); }

function getCalc() {
  const activeEmis  = state.emis.filter(e => !e.paid);
  const totalEmi    = activeEmis.reduce((s,e) => s+e.monthlyEmi, 0);
  const totalEmiBal = state.emis.reduce((s,e) => s+e.balanceAmount, 0);
  const totalDebtP  = state.personalDebts.reduce((s,d) => s+d.balance, 0);

  const bills       = state.utilityBills[state.currentMonth] || {};
  const totalUtil   = Object.values(bills).reduce((s,b) => s+(b.amount||0), 0);

  const fixedTotal  = (state.fixedExpenses||[]).reduce((s,f) => s+f.amount, 0);

  const exps        = state.monthlyExpenses[state.currentMonth] || [];
  const regularExp  = exps.reduce((s,e) => s+e.amount, 0);

  const lentOut     = state.moneyLent.reduce((s,l) => s+l.balance, 0);
  const lentTotal   = state.moneyLent.reduce((s,l) => s+l.amount, 0);

  const totalObligation = totalEmi + totalUtil + fixedTotal;
  const available       = state.monthlyIncome - totalObligation - regularExp;

  return { totalEmi, totalEmiBal, totalDebtP, totalUtil, fixedTotal,
           regularExp, lentOut, lentTotal, totalObligation, available };
}

function getPending() {
  const today = new Date().getDate();
  const list = [];

  state.emis.filter(e => !e.paid).forEach(e => {
    const d = e.dueDate - today;
    list.push({type:'EMI', name:e.name, amount:e.monthlyEmi, dueDate:e.dueDate,
               status:d<0?'overdue':d<=3?'due-soon':'upcoming', days:d});
  });

  const bills = state.utilityBills[state.currentMonth] || {};
  state.utilities.forEach(u => {
    const b = bills[u.id];
    if (!b || !b.paid) {
      const d = u.dueDate - today;
      const amt = b ? b.amount : (u.fixedAmount||0);
      list.push({type:u.type==='rent'?'Rent':'Utility', name:u.name, amount:amt,
                 dueDate:u.dueDate, status:d<0?'overdue':d<=3?'due-soon':'upcoming', days:d});
    }
  });

  const fpmts = state.fixedExpensePayments[state.currentMonth] || {};
  (state.fixedExpenses||[]).forEach(f => {
    if (!fpmts[f.id] || !fpmts[f.id].paid) {
      const d = f.dueDate - today;
      list.push({type:'Expense', name:f.name, amount:f.amount,
                 dueDate:f.dueDate, status:d<0?'overdue':d<=3?'due-soon':'upcoming', days:d});
    }
  });

  list.sort((a,b) => a.dueDate - b.dueDate);
  return list;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function updateIncome() {
  const v = parseFloat(document.getElementById('income-input').value);
  if (v > 0) { state.monthlyIncome = v; state.editingIncome = false; saveData(); toast('✅ Income updated!'); render(); }
}

function markEmiPayment(id) {
  state.emis = state.emis.map(e => {
    if (e.id !== id || e.balanceMonths < 1) return e;
    const newBal = e.balanceMonths - 1;
    return {...e, paidMonths:e.paidMonths+1, amountPaid:e.amountPaid+e.monthlyEmi,
            balanceMonths:newBal, balanceAmount:Math.max(0,e.balanceAmount-e.monthlyEmi), paid:newBal===0};
  });
  saveData(); toast('✅ Payment marked!'); render();
}

function undoEmiPayment(id) {
  state.emis = state.emis.map(e => {
    if (e.id !== id || e.paidMonths < 1) return e;
    return {...e, paidMonths:e.paidMonths-1, amountPaid:e.amountPaid-e.monthlyEmi,
            balanceMonths:e.balanceMonths+1, balanceAmount:e.balanceAmount+e.monthlyEmi, paid:false};
  });
  saveData(); toast('↩️ Undone!'); render();
}

function payDebt(id, amt) {
  state.personalDebts = state.personalDebts.map(d =>
    d.id===id ? {...d, paid:d.paid+amt, balance:Math.max(0,d.balance-amt)} : d
  );
  saveData(); toast('✅ Payment recorded!'); render();
}

function addNewDebt() {
  const type = document.getElementById('debt-type').value;
  const amt  = parseFloat(document.getElementById('debt-amount').value);
  if (!(amt > 0)) return;
  if (type === 'existing') {
    const person = document.getElementById('debt-person').value;
    state.personalDebts = state.personalDebts.map(d =>
      d.person===person ? {...d, amount:d.amount+amt, balance:d.balance+amt} : d
    );
  } else {
    const person = document.getElementById('new-person').value.trim();
    if (!person) return;
    state.personalDebts.push({id:Date.now(), person, amount:amt, paid:0, balance:amt});
  }
  state.showAddDebt = false;
  saveData(); toast('✅ Debt added!'); render();
}

function addMoneyLent() {
  const person  = document.getElementById('lent-person').value.trim();
  const amt     = parseFloat(document.getElementById('lent-amount').value);
  const note    = document.getElementById('lent-note').value.trim();
  const dueDate = document.getElementById('lent-due').value;
  if (!person || !(amt > 0)) return;
  state.moneyLent.push({id:Date.now(), person, amount:amt, collected:0, balance:amt, note, dueDate, date:new Date().toISOString()});
  state.showAddLent = false;
  saveData(); toast('✅ Lent entry added!'); render();
}

function collectLent(id, amt) {
  state.moneyLent = state.moneyLent.map(l =>
    l.id===id ? {...l, collected:l.collected+amt, balance:Math.max(0,l.balance-amt)} : l
  );
  saveData(); toast('✅ Collection recorded!'); render();
}

function deleteLent(id) {
  if (!confirm('Delete this lent entry?')) return;
  state.moneyLent = state.moneyLent.filter(l => l.id!==id);
  saveData(); toast('🗑️ Deleted!'); render();
}

function saveUtilityBill() {
  const uid = parseInt(document.getElementById('util-id').value);
  const amt = parseFloat(document.getElementById('util-amount').value);
  const note = document.getElementById('util-note').value;
  if (!(uid > 0) || !(amt > 0)) return;
  if (!state.utilityBills[state.currentMonth]) state.utilityBills[state.currentMonth] = {};
  state.utilityBills[state.currentMonth][uid] = {amount:amt, paid:false, date:new Date().toISOString(), note};
  saveData(); toast('✅ Bill saved!'); render();
}

function toggleUtilPaid(uid) {
  if (!state.utilityBills[state.currentMonth]) state.utilityBills[state.currentMonth] = {};
  const b = state.utilityBills[state.currentMonth][uid] || {};
  state.utilityBills[state.currentMonth][uid] = {...b, paid:!b.paid};
  saveData(); toast(b.paid ? '↩️ Marked unpaid' : '✅ Marked paid!'); render();
}

function quickAddRent(uid) {
  const u = state.utilities.find(u => u.id===uid);
  if (!u || !u.fixedAmount) return;
  if (!state.utilityBills[state.currentMonth]) state.utilityBills[state.currentMonth] = {};
  state.utilityBills[state.currentMonth][uid] = {amount:u.fixedAmount, paid:false, date:new Date().toISOString(), note:'Monthly rent'};
  saveData(); toast('✅ Rent bill entered!'); render();
}

function addCustomUtility() {
  const name    = document.getElementById('cu-name').value.trim();
  const icon    = document.getElementById('cu-icon').value.trim() || '🏠';
  const dueDate = parseInt(document.getElementById('cu-due').value);
  if (!name || !(dueDate > 0)) return;
  state.utilities.push({id:Date.now(), name, icon, dueDate, type:'custom'});
  state.showAddUtility = false;
  saveData(); toast('✅ Utility added!'); render();
}

function toggleFixedExpPaid(id) {
  if (!state.fixedExpensePayments[state.currentMonth]) state.fixedExpensePayments[state.currentMonth] = {};
  const p = state.fixedExpensePayments[state.currentMonth][id] || {};
  state.fixedExpensePayments[state.currentMonth][id] = {paid:!p.paid, date:new Date().toISOString()};
  saveData(); toast(p.paid ? '↩️ Marked unpaid' : '✅ Marked paid!'); render();
}

function addExpense() {
  const cat  = document.getElementById('exp-cat').value;
  const amt  = parseFloat(document.getElementById('exp-amt').value);
  const desc = document.getElementById('exp-desc').value;
  if (!(amt > 0)) return;
  if (!state.monthlyExpenses[state.currentMonth]) state.monthlyExpenses[state.currentMonth] = [];
  state.monthlyExpenses[state.currentMonth].push({id:Date.now(), date:new Date().toISOString(), category:cat, amount:amt, description:desc});
  saveData(); toast('✅ Expense added!'); render();
}

function deleteExpense(id) {
  if (!state.monthlyExpenses[state.currentMonth]) return;
  state.monthlyExpenses[state.currentMonth] = state.monthlyExpenses[state.currentMonth].filter(e => e.id!==id);
  saveData(); toast('🗑️ Deleted!'); render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fin-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('📥 Exported!');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      state = Object.assign({}, state, parsed, {activeTab:'overview', editingIncome:false, showAddDebt:false, showAddLent:false, showAddUtility:false});
      migrateOldData();
      saveData(); toast('📤 Imported & migrated!'); render();
    } catch { toast('❌ Invalid file!', 'error'); }
  };
  r.readAsText(file);
}

// ─── NOTIFICATION ─────────────────────────────────────────────────────────────
async function requestNotifications() {
  if (!('Notification' in window)) { toast('❌ Not supported', 'error'); return; }
  const p = await Notification.requestPermission();
  if (p === 'granted') { state.notificationsEnabled = true; saveData(); scheduleNotifications(); toast('🔔 Enabled!'); }
  else { toast('❌ Permission denied', 'error'); }
  render();
}

function scheduleNotifications() {
  if (!state.notificationsEnabled || Notification.permission !== 'granted') return;
  const today = new Date().getDate();
  const due = [];
  state.emis.filter(e=>!e.paid).forEach(e => { const d=e.dueDate-today; if(d>=0&&d<=3) due.push(e.name+(d===0?' (TODAY)':' in '+d+'d')); });
  state.utilities.forEach(u => {
    const b=(state.utilityBills[state.currentMonth]||{})[u.id];
    if(!b||!b.paid){const d=u.dueDate-today;if(d>=0&&d<=3) due.push(u.name+(d===0?' (TODAY)':' in '+d+'d'));}
  });
  (state.fixedExpenses||[]).forEach(f => {
    const p=(state.fixedExpensePayments[state.currentMonth]||{})[f.id];
    if(!p||!p.paid){const d=f.dueDate-today;if(d>=0&&d<=3) due.push(f.name+(d===0?' (TODAY)':' in '+d+'d'));}
  });
  if (due.length) new Notification('💰 Upcoming Payments', {body: due.join(', ')});
}

// ─── RENDER: EMIs ─────────────────────────────────────────────────────────────
function renderEmis() {
  // Active EMIs first, paid/cleared at bottom
  const sorted = [...state.emis].sort((a,b) => {
    if (!a.paid && b.paid) return -1;
    if (a.paid && !b.paid) return 1;
    return 0;
  });

  const hasActive  = sorted.some(e => !e.paid);
  const hasCleared = sorted.some(e => e.paid);
  let html = '<h2 class="text-xl font-bold mb-4">📅 EMI Obligations</h2>';

  sorted.forEach((emi, idx) => {
    const isCleared = emi.paid;
    // Show divider before first cleared item
    if (isCleared && idx > 0 && !sorted[idx-1].paid) {
      html += '<div class="divider-label">✅ Cleared EMIs</div>';
    }
    const pct = emi.tenure > 0 ? (emi.paidMonths/emi.tenure)*100 : 100;

    html += '<div class="card ' + (isCleared ? 'paid-card cleared-card' : '') + '">' +
      '<div class="flex" style="justify-content:space-between;margin-bottom:12px">' +
        '<div>' +
          '<h3 class="font-bold text-xl mb-1">' + emi.name + (isCleared ? ' <span style="font-size:13px;color:#10b981">(Cleared)</span>' : '') + '</h3>' +
          '<p class="text-sm text-gray">Due: ' + ord(emi.dueDate) + ' of each month</p>' +
        '</div>' +
        (isCleared ? '<span style="font-size:24px">✅</span>' : '') +
      '</div>' +
      '<div class="space-y text-sm mb-3">' +
        '<div class="flex" style="justify-content:space-between;padding:4px 0"><span class="text-gray">Monthly EMI</span><span class="font-bold">AED ' + fmt(emi.monthlyEmi) + '</span></div>' +
        '<div class="flex" style="justify-content:space-between;padding:4px 0"><span class="text-gray">Balance</span><span class="font-bold ' + (isCleared?'text-green':'text-orange') + '">AED ' + fmt(emi.balanceAmount) + '</span></div>' +
        '<div class="flex" style="justify-content:space-between;padding:4px 0"><span class="text-gray">Months Remaining</span><span class="font-bold">' + emi.balanceMonths + '</span></div>' +
        '<div class="flex" style="justify-content:space-between;padding:4px 0"><span class="text-gray">Progress</span><span class="font-bold">' + emi.paidMonths + '/' + emi.tenure + '</span></div>' +
      '</div>' +
      '<div class="progress-bar mb-3"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      (!isCleared ?
        '<div class="flex flex-gap">' +
          '<button class="btn btn-primary flex-1" onclick="markEmiPayment(' + emi.id + ')">Mark Payment Made</button>' +
          (emi.paidMonths > 0 ? '<button class="btn btn-orange" onclick="undoEmiPayment(' + emi.id + ')">↩️</button>' : '') +
        '</div>' : '') +
    '</div>';
  });

  if (!hasActive) html += '<div class="card" style="text-align:center;padding:24px;border:1px solid #10b981"><p class="text-green font-bold">🎉 All EMIs cleared!</p></div>';
  return html;
}

// ─── RENDER: UTILITIES ────────────────────────────────────────────────────────
function renderUtilities() {
  const bills    = state.utilityBills[state.currentMonth] || {};
  const billed   = Object.values(bills).reduce((s,b)=>s+(b.amount||0),0);
  const paid     = Object.values(bills).reduce((s,b)=>s+(b.paid?b.amount||0:0),0);
  const today    = new Date().getDate();

  const addForm = state.showAddUtility ?
    '<div class="card mb-4">' +
      '<h3 class="font-bold mb-3">Add Custom Utility</h3>' +
      '<div class="space-y">' +
        '<input type="text" id="cu-name" class="input" placeholder="Utility name">' +
        '<input type="text" id="cu-icon" class="input" placeholder="Emoji icon (e.g. 🚗)">' +
        '<input type="number" id="cu-due" class="input" placeholder="Due date (day of month)">' +
        '<div class="flex flex-gap">' +
          '<button class="btn btn-yellow flex-1" onclick="addCustomUtility()">Add</button>' +
          '<button class="btn btn-secondary flex-1" onclick="state.showAddUtility=false;render()">Cancel</button>' +
        '</div>' +
      '</div>' +
    '</div>' : '';

  const cards = state.utilities.map(function(u) {
    const b      = bills[u.id];
    const diff   = u.dueDate - today;
    const isPaid = b && b.paid;
    const isRent = u.type === 'rent';
    const over   = diff < 0 && !isPaid;
    const soon   = diff >= 0 && diff <= 3 && !isPaid;
    const badge  = isPaid ? '<span class="badge badge-success">PAID ✅</span>'
                 : over   ? '<span class="badge badge-danger">OVERDUE</span>'
                 : soon   ? '<span class="badge badge-warning">DUE SOON</span>'
                           : '<span class="badge badge-info">UPCOMING</span>';

    return '<div class="card ' + (isPaid?'paid-card':'') + '">' +
      '<div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:12px">' +
        '<div class="flex" style="align-items:center;gap:10px">' +
          '<div style="font-size:32px">'+u.icon+'</div>' +
          '<div>' +
            '<div class="font-bold" style="font-size:16px">'+u.name+(isRent?' <span class="badge badge-purple" style="font-size:10px">RENT</span>':'')+'</div>' +
            '<div class="text-sm text-gray">Due: '+ord(u.dueDate)+' of month</div>' +
            (isRent && u.fixedAmount ? '<div class="text-sm text-yellow">Fixed: AED '+fmt(u.fixedAmount)+'/mo</div>' : '') +
          '</div>' +
        '</div>' +
        badge +
      '</div>' +
      (isRent && !b ?
        '<div>' +
          '<p class="text-sm text-gray mb-2">No bill entered for '+monthName(state.currentMonth)+' yet.</p>' +
          '<button class="btn btn-primary" style="width:100%" onclick="quickAddRent('+u.id+')">⚡ Quick Add AED '+fmt(u.fixedAmount)+'</button>' +
        '</div>' : '') +
      (b ?
        '<div class="space-y text-sm mb-3">' +
          '<div class="flex" style="justify-content:space-between;padding:4px 0"><span class="text-gray">Amount</span><span class="font-bold text-yellow">AED '+fmt(b.amount)+'</span></div>' +
          (b.note ? '<div class="flex" style="justify-content:space-between;padding:4px 0"><span class="text-gray">Note</span><span>'+b.note+'</span></div>' : '') +
        '</div>' +
        '<button class="btn '+(isPaid?'btn-secondary':'btn-success')+'" style="width:100%" onclick="toggleUtilPaid('+u.id+')">' +
          (isPaid ? '↩️ Mark Unpaid' : '✅ Mark as Paid') +
        '</button>' : '') +
      (!b && !isRent ? '<p class="text-sm text-gray">No bill entered for '+monthName(state.currentMonth)+' yet.</p>' : '') +
    '</div>';
  }).join('');

  return '<div class="section-header"><h2 class="text-xl font-bold">🏠 Utilities & Rent</h2>' +
    '<button class="btn btn-yellow" style="padding:8px 12px" onclick="state.showAddUtility=true;render()">➕ Add</button></div>' +
    addForm +
    '<div class="grid-3 mb-4">' +
      '<div class="summary-card"><div class="val text-yellow">AED '+fmt(billed)+'</div><div class="lbl">This Month</div></div>' +
      '<div class="summary-card"><div class="val text-green">AED '+fmt(paid)+'</div><div class="lbl">Paid</div></div>' +
      '<div class="summary-card"><div class="val text-red">AED '+fmt(billed-paid)+'</div><div class="lbl">Unpaid</div></div>' +
    '</div>' +
    '<div class="card mb-4"><h3 class="font-bold mb-3">📝 Enter Bill Amount</h3>' +
      '<div class="space-y">' +
        '<select id="util-id" class="input">' + state.utilities.map(u=>'<option value="'+u.id+'">'+u.icon+' '+u.name+(u.fixedAmount?' (AED '+fmt(u.fixedAmount)+')'  :'')+' — '+ord(u.dueDate)+'</option>').join('') + '</select>' +
        '<input type="number" id="util-amount" class="input" placeholder="Bill amount (AED)">' +
        '<input type="text" id="util-note" class="input" placeholder="Note (optional)">' +
        '<button class="btn btn-yellow" style="width:100%" onclick="saveUtilityBill()">Save Bill</button>' +
      '</div>' +
    '</div>' +
    cards;
}

// ─── RENDER: EXPENSES ─────────────────────────────────────────────────────────
function renderExpenses() {
  const exps     = state.monthlyExpenses[state.currentMonth] || [];
  const regTotal = exps.reduce((s,e)=>s+e.amount,0);
  const fpmts    = state.fixedExpensePayments[state.currentMonth] || {};
  const fixTotal = (state.fixedExpenses||[]).reduce((s,f)=>s+f.amount,0);
  const grand    = regTotal + fixTotal;

  const fixedCards = (state.fixedExpenses||[]).map(function(f) {
    const p    = fpmts[f.id];
    const paid = p && p.paid;
    return '<div class="flex" style="justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #334155">' +
      '<div>' +
        '<div class="font-bold">'+f.icon+' '+f.name+'</div>' +
        '<div class="text-sm text-gray">Due: '+ord(f.dueDate)+' • AED '+fmt(f.amount)+'/mo</div>' +
        (paid ? '<div class="text-sm text-green">✅ Paid on '+new Date(p.date).toLocaleDateString()+'</div>' : '') +
      '</div>' +
      '<button class="btn '+(paid?'btn-secondary':'btn-success')+'" style="padding:8px 12px;font-size:13px" onclick="toggleFixedExpPaid('+f.id+')">' +
        (paid ? '↩️ Unpaid' : '✅ Mark Paid') +
      '</button>' +
    '</div>';
  }).join('');

  const expCards = exps.slice().reverse().map(function(exp) {
    return '<div class="card">' +
      '<div class="flex" style="justify-content:space-between;align-items:center">' +
        '<div class="flex-1">' +
          '<div class="font-bold">'+exp.category+'</div>' +
          '<div class="text-sm text-gray">'+(exp.description||'No description')+' • '+new Date(exp.date).toLocaleDateString()+'</div>' +
        '</div>' +
        '<div class="flex" style="align-items:center;gap:12px">' +
          '<div class="font-bold text-orange">AED '+fmt(exp.amount)+'</div>' +
          '<button onclick="deleteExpense('+exp.id+')" style="background:none;border:none;color:#ef4444;cursor:pointer">🗑️</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  return '<h2 class="text-xl font-bold mb-4">📊 Expenses — '+monthName(state.currentMonth)+'</h2>' +

    '<div class="card mb-4" style="border:1px solid #9333ea">' +
      '<h3 class="font-bold mb-3">🔁 Fixed Monthly</h3>' +
      fixedCards +
      '<div class="stat-row border-top"><span class="text-gray text-sm">Fixed Total</span><span class="font-bold text-purple">AED '+fmt(fixTotal)+'</span></div>' +
    '</div>' +

    '<div class="card mb-4">' +
      '<h3 class="font-bold mb-3">➕ Add Expense</h3>' +
      '<div class="space-y">' +
        '<select id="exp-cat" class="input"><option>Food & Groceries</option><option>Transportation</option><option>Entertainment</option><option>Healthcare</option><option>Clothing</option><option>Personal Care</option><option>Other</option></select>' +
        '<input type="number" id="exp-amt" class="input" placeholder="Amount (AED)">' +
        '<input type="text" id="exp-desc" class="input" placeholder="Description (optional)">' +
        '<button class="btn btn-success" style="width:100%" onclick="addExpense();document.getElementById(\'exp-amt\').value=\'\';document.getElementById(\'exp-desc\').value=\'\'">Add Expense</button>' +
      '</div>' +
    '</div>' +

    '<div class="card mb-4" style="background:linear-gradient(135deg,#9333ea,#ec4899);text-align:center">' +
      '<div class="text-3xl font-bold">AED '+fmt(grand)+'</div>' +
      '<div class="text-sm mt-2">Total — Fixed: AED '+fmt(fixTotal)+' + Other: AED '+fmt(regTotal)+'</div>' +
    '</div>' +

    (exps.length===0 ?
      '<div class="card" style="text-align:center;padding:32px"><p class="text-gray">No additional expenses logged yet.</p></div>'
      : expCards);
}

// ─── RENDER: NOTIFICATIONS ────────────────────────────────────────────────────
function renderNotifications() {
  const supported = 'Notification' in window;
  const granted   = supported && Notification.permission === 'granted';

  const allItems = [...state.emis.filter(e=>!e.paid), ...state.utilities, ...(state.fixedExpenses||[])];
  const dueDateRows = allItems.map(item =>
    '<div class="stat-row" style="padding:8px 0;border-bottom:1px solid #334155">' +
      '<span class="text-sm">'+(item.name||item.person)+'</span>' +
      '<span class="badge badge-info">'+ord(item.dueDate)+' of month</span>' +
    '</div>'
  ).join('');

  return '<h2 class="text-xl font-bold mb-4">🔔 Reminders & Notifications</h2>' +
    '<div class="card mb-4" style="border:1px solid #2563eb"><h3 class="mb-3">📱 Browser Notifications</h3>' +
      (!supported ? '<p class="text-sm text-red">❌ Not supported.</p>' :
       granted ?
        '<div style="background:rgba(16,185,129,.15);border:1px solid #10b981;border-radius:8px;padding:12px;margin-bottom:12px"><p class="text-green font-bold">✅ Notifications enabled!</p></div>' +
        '<button class="btn btn-primary" style="width:100%" onclick="scheduleNotifications()">🔔 Test Now</button>' :
        '<button class="btn btn-primary" style="width:100%" onclick="requestNotifications()">🔔 Enable Notifications</button>') +
    '</div>' +
    '<div class="notif-box"><h3 class="font-bold mb-3">📲 Phone Reminder Tips</h3>' +
      '<div class="notif-step"><div class="step-num">1</div><div><div class="font-bold text-sm">iPhone — Reminders</div><div class="text-sm text-gray mt-2">Open Reminders → New → Set date → enable Repeat → Monthly.</div></div></div>' +
      '<div class="notif-step"><div class="step-num">2</div><div><div class="font-bold text-sm">Android — Google Calendar</div><div class="text-sm text-gray mt-2">Create Event → Repeat: Monthly → Notification: 1 day before.</div></div></div>' +
      '<div class="notif-step"><div class="step-num">3</div><div><div class="font-bold text-sm">Add to Home Screen</div><div class="text-sm text-gray mt-2">iPhone: Share → Add to Home Screen. Android: ⋮ → Add to Home Screen.</div></div></div>' +
    '</div>' +
    '<div class="card"><h3 class="font-bold mb-3">📋 Due Dates Reference</h3>' + dueDateRows + '</div>';
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function renderNav() {
  return [
    {id:'overview',      icon:'💵', label:'Overview'},
    {id:'pending',       icon:'⏰', label:'Pending'},
    {id:'emis',          icon:'📅', label:'EMIs'},
    {id:'personal',      icon:'📉', label:'Debts'},
    {id:'lent',          icon:'🤝', label:'Lent'},
    {id:'utilities',     icon:'🏠', label:'Utils'},
    {id:'expenses',      icon:'📊', label:'Expenses'},
    {id:'notifications', icon:'🔔', label:'Alerts'},
  ].map(t =>
    '<button class="nav-btn '+(state.activeTab===t.id?'active':'')+'" onclick="state.activeTab=\''+t.id+'\';render()">' +
      '<span style="font-size:20px">'+t.icon+'</span><span>'+t.label+'</span>' +
    '</button>'
  ).join('');
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const nav = document.getElementById('bottomNav');
  const ms  = document.getElementById('monthSelector');

  ms.innerHTML = ['expenses','utilities'].includes(state.activeTab) ? renderMonthSel() : '';

  switch(state.activeTab) {
    case 'overview':       app.innerHTML = renderOverview();       break;
    case 'pending':        app.innerHTML = renderPending();        break;
    case 'emis':           app.innerHTML = renderEmis();           break;
    case 'personal':       app.innerHTML = renderPersonalDebts();  break;
    case 'lent':           app.innerHTML = renderMoneyLent();      break;
    case 'utilities':      app.innerHTML = renderUtilities();      break;
    case 'expenses':       app.innerHTML = renderExpenses();       break;
    case 'notifications':  app.innerHTML = renderNotifications();  break;
    default:               app.innerHTML = renderOverview();
  }

  nav.innerHTML = renderNav();
  updateLastSaved();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadData();
render();
setInterval(saveData, 30000);
setTimeout(() => { if(state.notificationsEnabled) scheduleNotifications(); }, 2000);
</script>

</body>
</html>
